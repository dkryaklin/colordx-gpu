name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm test

      - name: Version bump (requires a manual CHANGELOG.md entry)
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          if ! grep -q "^## ${VERSION}$" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## ${VERSION}' entry — write one and push before releasing."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push --follow-tags

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub release with CHANGELOG notes
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NOTES=$(VERSION="$VERSION" node -e '
            const fs = require("fs");
            const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
            const version = process.env.VERSION;
            const match = changelog.match(new RegExp("## " + version.replace(/\./g, "\\.") + "\\n([\\s\\S]*?)(?=\\n## |$)"));
            process.stdout.write(match ? match[1].trim() : "");
          ')
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "${NOTES}" \
            2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
